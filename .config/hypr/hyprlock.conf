general {
    hide_cursor = true
    grace = 0
}

background {
    monitor =
    path = /usr/share/backgrounds/default.png
    blur_size = 4
    blur_passes = 2
}

input-field {
    monitor =
    size = 300, 60
    outline_thickness = 2
    dots_size = 0.3
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgb(151515)
    inner_color = rgb(200, 200, 200)
    font_color = rgb(10, 10, 10)
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = Hi there, $USER
    color = rgb(200, 200, 200)
    font_size = 25
    font_family = Sans
    position = 0, 80
    halign = center
    valign = center
}
